<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oracle SQL Formatter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'Consolas', 'monospace'],
                    },
                },
            },
        };
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #0f172a; font-family: system-ui, -apple-system, sans-serif; }

        .editor-box {
            height: 100%;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            overflow: hidden;
            background: #1e293b;
        }
        .editor-box .editor-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            user-select: none;
        }
        .editor-box .monaco-editor-container {
            height: calc(100% - 2.5rem);
        }

        /* ELSIF 关键字高亮 */
        .elsif-highlight {
            color: #7dd3fc !important;
            font-weight: bold !important;
        }
        /* INSERT 列值匹配高亮 (光晕效果) */
        .insert-match-highlight {
            background-color: #3b82f640 !important;
            border-bottom: 2px solid #60a5fa !important;
            box-shadow: 0 0 0 1px #3b82f620;
            border-radius: 2px;
        }

        /* Override Monaco to fit our dark theme */
        .monaco-editor .margin,
        .monaco-editor .monaco-editor-background {
            background-color: #1e293b !important;
        }
    </style>
</head>
<body>
    <div class="h-screen flex flex-col">
        <!-- Top bar -->
        <header class="flex items-center justify-between px-6 py-3 bg-[#1e293b] border-b border-slate-700/50 shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white font-bold text-sm">
                    O$
                </div>
                <div>
                    <h1 class="text-white font-semibold text-base leading-tight">Oracle SQL Formatter</h1>
                    <p class="text-slate-400 text-xs leading-tight">粘贴 → 格式化 → 复制</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="formatBtn" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors shadow-lg shadow-blue-600/20 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    格式化
                </button>
                <button id="clearBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-medium rounded-lg transition-colors">
                    清空
                </button>
            </div>
        </header>

        <!-- Editor area -->
        <div class="flex-1 flex gap-3 p-3 min-h-0">
            <!-- Input -->
            <div class="flex-1 flex flex-col min-w-0">
                <div id="inputEditor" class="editor-box flex-1">
                    <div class="editor-label">
                        <span>原始输入</span>
                        <span id="inputStats" class="text-slate-500 text-[10px] font-normal">0 行</span>
                    </div>
                    <div id="inputMonaco" class="monaco-editor-container"></div>
                </div>
            </div>

            <!-- Output -->
            <div class="flex-1 flex flex-col min-w-0">
                <div id="outputEditor" class="editor-box flex-1">
                    <div class="editor-label">
                        <span>格式化输出</span>
                        <span id="outputStats" class="text-slate-500 text-[10px] font-normal">0 行</span>
                    </div>
                    <div id="outputMonaco" class="monaco-editor-container"></div>
                </div>
            </div>
        </div>

        <!-- Status bar -->
        <div id="statusBar" class="flex items-center justify-between px-6 py-1.5 bg-[#1e293b] border-t border-slate-700/50 shrink-0">
            <span class="text-slate-500 text-xs">就绪</span>
            <span class="text-slate-600 text-xs">Ctrl+Enter 快速格式化</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        const API_URL = '/api/format';

        require.config({
            paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }
        });

        require(['vs/editor/editor.main'], function () {
            monaco.editor.defineTheme('oracle-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword', foreground: '7dd3fc', fontStyle: 'bold' },
                    { token: 'type', foreground: 'c084fc' },
                    { token: 'string', foreground: '86efac' },
                    { token: 'number', foreground: 'fde68a' },
                    { token: 'comment', foreground: '6b7280', fontStyle: 'italic' },
                    { token: 'identifier', foreground: 'e2e8f0' },
                ],
                colors: {
                    'editor.background': '#1e293b',
                    'editor.foreground': '#e2e8f0',
                    'editor.lineHighlightBackground': '#33415540',
                    'editorLineNumber.foreground': '#475569',
                    'editorLineNumber.activeForeground': '#94a3b8',
                    'editorCursor.foreground': '#60a5fa',
                    'editor.selectionBackground': '#3b82f660',
                    'editorWidget.background': '#1e293b',
                    'editorWidget.border': '#334155',
                    'editorIndentGuide.background': '#33415560',
                    'editorIndentGuide.activeBackground': '#47556980',
                }
            });

            const COMMON_OPTS = {
                language: 'sql',
                theme: 'oracle-dark',
                fontSize: 13,
                fontFamily: "'JetBrains Mono', 'Fira Code', Consolas, monospace",
                fontLigatures: true,
                minimap: { enabled: false },
                automaticLayout: true,
                scrollBeyondLastLine: false,
                wordWrap: 'on',
                lineNumbers: 'on',
                renderWhitespace: 'selection',
                smoothScrolling: true,
                padding: { top: 12 },
                bracketPairColorization: { enabled: true },
                contextmenu: false,
            };

            const DEFAULT_SQL = [
                'create or replace procedure get_employee_report',
                '  (p_dept_id   in  number,',
                '   p_cursor    out sys_refcursor)',
                'as',
                '  v_count number;',
                '  v_name  varchar2(100);',
                'begin',
                '  select count(*)',
                '    into v_count',
                '    from employees',
                '   where dept_id = p_dept_id;',
                '',
                '  if v_count = 0 then',
                '    raise_application_error(-20001, \'no employees found\');',
                '  end if;',
                '',
                '  for rec in (',
                '    select emp_id, emp_name, salary',
                '      from employees',
                '     where dept_id = p_dept_id',
                '       and status = \'active\'',
                '  ) loop',
                '    process_employee(rec.emp_id, rec.emp_name);',
                '  end loop;',
                '',
                '  open p_cursor for',
                '    select emp_id, emp_name, hire_date',
                '      from employees',
                '     where dept_id = p_dept_id',
                '     order by hire_date desc;',
                'exception',
                '  when no_data_found then',
                '    dbms_output.put_line(\'empty result\');',
                '  when others then',
                '    rollback;',
                '    raise;',
                'end get_employee_report;',
            ].join('\n');

            const inputMonaco = document.getElementById('inputMonaco');
            const outputMonaco = document.getElementById('outputMonaco');

            const inputEditor = monaco.editor.create(inputMonaco, {
                ...COMMON_OPTS,
                value: DEFAULT_SQL,
                language: 'sql',
            });

            const outputEditor = monaco.editor.create(outputMonaco, {
                ...COMMON_OPTS,
                value: '-- 点击 "格式化" 按钮查看结果',
                readOnly: true,
            });

            function updateStats() {
                const inLines = inputEditor.getModel().getLineCount();
                document.getElementById('inputStats').textContent = inLines + ' 行';
                const outLines = outputEditor.getModel().getLineCount();
                document.getElementById('outputStats').textContent = outLines + ' 行';
            }

            inputEditor.onDidChangeModelContent(updateStats);
            outputEditor.onDidChangeModelContent(updateStats);
            setTimeout(updateStats, 500);

            // Format action
            async function doFormat() {
                const sql = inputEditor.getValue();
                if (!sql.trim()) {
                    outputEditor.setValue('-- 请输入 SQL 代码');
                    document.getElementById('statusBar').querySelector('span:first-child').textContent =
                        '⚠️ 请输入 SQL 代码';
                    return;
                }

                const statusEl = document.getElementById('statusBar').querySelector('span:first-child');
                const btn = document.getElementById('formatBtn');
                btn.disabled = true;
                btn.innerHTML = `
                    <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    格式化中...
                `;
                statusEl.textContent = '⏳ 正在格式化...';

                try {
                    const resp = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ sql }),
                    });

                    if (!resp.ok) {
                        const err = await resp.json();
                        const msg = JSON.stringify(err.detail || err);
                        outputEditor.setValue('-- 错误: ' + msg);
                        statusEl.textContent = '❌ ' + msg;
                        return;
                    }

                    const data = await resp.json();
                    outputEditor.setValue(data.formatted);
                    statusEl.textContent = '✅ 格式化完成  (' + data.formatted.split('\n').length + ' 行)';
                } catch (e) {
                    outputEditor.setValue('-- 请求失败: ' + e.message);
                    statusEl.textContent = '❌ 网络错误 — 请确认后端已启动';
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = `
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        格式化
                    `;
                }
            }

            document.getElementById('formatBtn').addEventListener('click', doFormat);

            document.getElementById('clearBtn').addEventListener('click', function () {
                inputEditor.setValue('');
                outputEditor.setValue('-- 点击 "格式化" 按钮查看结果');
                document.getElementById('statusBar').querySelector('span:first-child').textContent = '已清空';
            });

        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                doFormat();
            }
        });

        // ==========================================
        // ELSIF 关键字高亮
        // ==========================================
        const _elsif = { input: [], output: [] };

        function refreshELSIF(editor, key) {
            const model = editor.getModel();
            if (!model) return;
            const text = model.getValue();
            const decos = [];
            const re = /\bELSIF\b/g;
            let m;
            while ((m = re.exec(text)) !== null) {
                const s = model.getPositionAt(m.index);
                const e = model.getPositionAt(m.index + m[0].length);
                decos.push({
                    range: new monaco.Range(s.lineNumber, s.column, e.lineNumber, e.column),
                    options: { inlineClassName: 'elsif-highlight' }
                });
            }
            _elsif[key] = editor.deltaDecorations(_elsif[key], decos);
        }

        // ==========================================
        // INSERT 列值匹配高亮
        // ==========================================
        const _insert = { input: [], output: [] };

        function _isStr(text, pos) {
            let sq = false, dq = false;
            for (let i = 0; i < pos; i++) {
                if (text[i] === "'" && !dq) sq = !sq;
                if (text[i] === '"' && !sq) dq = !dq;
            }
            return sq || dq;
        }

        function _findInsert(text, offset) {
            const re = /\bINSERT\s+INTO\s+/gi;
            let m;
            while ((m = re.exec(text)) !== null) {
                const S = { cols: [], vals: [], sel: [] };
                let i = re.lastIndex;
                while (i < text.length && text[i] === ' ') i++;
                while (i < text.length && /[\w.\[\]@#$]/.test(text[i])) i++;
                while (i < text.length && text[i] === ' ') i++;
                if (i >= text.length || text[i] !== '(') continue;
                const colRegionStart = i;
                i++;
                let depth = 1, buf = '', colStart = i;
                while (i < text.length && depth > 0) {
                    const ch = text[i];
                    if ((ch === "'" || ch === '"') && !_isStr(text, i)) {
                        const q = ch; buf += q; i++;
                        while (i < text.length && text[i] !== q) { buf += text[i]; i++; }
                        if (i < text.length) { buf += q; i++; }
                        continue;
                    }
                    if (ch === '(' && !_isStr(text, i)) depth++;
                    else if (ch === ')' && !_isStr(text, i)) {
                        depth--;
                        if (depth === 0) { if (buf.trim()) S.cols.push({ t: buf.trim(), s: colStart, e: i }); break; }
                    }
                    if (depth === 1 && ch === ',' && !_isStr(text, i)) {
                        S.cols.push({ t: buf.trim(), s: colStart, e: i });
                        buf = ''; i++; colStart = i; continue;
                    }
                    buf += ch; i++;
                }
                const colRegionEnd = i;
                i++;
                while (i < text.length && text[i] === ' ') i++;

                const v = text.substring(i).match(/^VALUES\s*\(/i);
                if (v) {
                    i += v[0].length;
                    depth = 1; buf = ''; let valStart = i;
                    while (i < text.length && depth > 0) {
                        const ch = text[i];
                        if ((ch === "'" || ch === '"') && !_isStr(text, i)) {
                            const q = ch; buf += q; i++;
                            while (i < text.length && text[i] !== q) { buf += text[i]; i++; }
                            if (i < text.length) { buf += q; i++; }
                            continue;
                        }
                        if (ch === '(' && !_isStr(text, i)) depth++;
                        else if (ch === ')' && !_isStr(text, i)) {
                            depth--;
                            if (depth === 0) { if (buf.trim()) S.vals.push({ t: buf.trim(), s: valStart, e: i }); break; }
                        }
                        if (depth === 1 && ch === ',' && !_isStr(text, i)) {
                            S.vals.push({ t: buf.trim(), s: valStart, e: i });
                            buf = ''; i++; valStart = i; continue;
                        }
                        buf += ch; i++;
                    }
                    S.regionEnd = i + 1;
                    if (offset >= m.index && offset <= S.regionEnd) return S;
                } else {
                    const s = text.substring(i).match(/^SELECT\b/i);
                    if (s) {
                        i += s[0].length;
                        depth = 0; buf = ''; let selStart = i;
                        const endIdx = (() => {
                            let j = i;
                            while (j < text.length) {
                                if (text[j] === ';') return j;
                                const from = text.substring(j).match(/\bFROM\b/i);
                                if (from && j + from.index > i && depth === 0) return j + from.index;
                                if (text[j] === '(') depth++;
                                else if (text[j] === ')') depth = Math.max(0, depth - 1);
                                j++;
                            }
                            return text.length;
                        })();
                        let j = i;
                        depth = 0;
                        while (j < endIdx) {
                            const ch = text[j];
                            if ((ch === "'" || ch === '"') && !_isStr(text, j)) {
                                const q = ch; buf += q; j++;
                                while (j < text.length && text[j] !== q) { buf += text[j]; j++; }
                                if (j < text.length) { buf += q; j++; }
                                continue;
                            }
                            if (ch === '(') depth++;
                            else if (ch === ')') depth = Math.max(0, depth - 1);
                            if (depth === 0 && ch === ',' && j > i) {
                                if (buf.trim()) S.sel.push({ t: buf.trim(), s: selStart, e: j });
                                buf = ''; j++; selStart = j; continue;
                            }
                            buf += ch; j++;
                        }
                        if (buf.trim()) S.sel.push({ t: buf.trim(), s: selStart, e: j });
                        S.regionEnd = endIdx;
                        if (offset >= m.index && offset <= S.regionEnd) return S;
                    }
                }
            }
            return null;
        }

        function refreshInsert(editor, key) {
            const model = editor.getModel();
            if (!model) return;
            if (_insert[key]) editor.deltaDecorations(_insert[key], []);
            const pos = editor.getPosition();
            const offset = model.getOffsetAt(pos);
            const S = _findInsert(model.getValue(), offset);
            if (!S) { _insert[key] = []; return; }

            let src = null, dst = null, inCols = false;
            if (S.vals.length) {
                for (const c of S.cols) { if (offset >= c.s && offset <= c.e) { src = c; inCols = true; break; } }
                if (!src) for (const v of S.vals) { if (offset >= v.s && offset <= v.e) { src = v; break; } }
                if (src) {
                    const idx = inCols ? S.cols.indexOf(src) : S.vals.indexOf(src);
                    if (idx >= 0) dst = inCols ? S.vals[idx] : S.cols[idx];
                }
            } else if (S.sel.length) {
                for (const c of S.cols) { if (offset >= c.s && offset <= c.e) { src = c; inCols = true; break; } }
                if (!src) for (const c of S.sel) { if (offset >= c.s && offset <= c.e) { src = c; break; } }
                if (src) {
                    const idx = inCols ? S.cols.indexOf(src) : S.sel.indexOf(src);
                    if (idx >= 0) dst = inCols ? S.sel[idx] : S.cols[idx];
                }
            }

            const decos = [];
            if (src) decos.push({
                range: new monaco.Range(
                    model.getPositionAt(src.s).lineNumber, model.getPositionAt(src.s).column,
                    model.getPositionAt(src.e).lineNumber, model.getPositionAt(src.e).column
                ),
                options: { inlineClassName: 'insert-match-highlight' }
            });
            if (dst) decos.push({
                range: new monaco.Range(
                    model.getPositionAt(dst.s).lineNumber, model.getPositionAt(dst.s).column,
                    model.getPositionAt(dst.e).lineNumber, model.getPositionAt(dst.e).column
                ),
                options: { inlineClassName: 'insert-match-highlight' }
            });
            _insert[key] = editor.deltaDecorations([], decos);
        }

        // 注册事件
        function onModelChange(editor, key) {
            refreshELSIF(editor, key);
            refreshInsert(editor, key);
        }

        inputEditor.onDidChangeModelContent(function () { onModelChange(inputEditor, 'input'); });
        outputEditor.onDidChangeModelContent(function () { onModelChange(outputEditor, 'output'); });
        inputEditor.onDidChangeCursorPosition(function () { refreshInsert(inputEditor, 'input'); });
        outputEditor.onDidChangeCursorPosition(function () { refreshInsert(outputEditor, 'output'); });
        setTimeout(function () {
            refreshELSIF(inputEditor, 'input');
            refreshELSIF(outputEditor, 'output');
        }, 600);
    });
    </script>
</body>
</html>
